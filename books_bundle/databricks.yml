# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "books_bundle"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-a267a757-990f.cloud.databricks.com

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://dbc-a267a757-990f.cloud.databricks.com
      # We always use /Users/paolo.gattesco@tinextacyber.com for all resources to make sure we only have a single copy.
      root_path: /Users/paolo.gattesco@tinextacyber.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as paolo.gattesco@tinextacyber.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: paolo.gattesco@tinextacyber.com
