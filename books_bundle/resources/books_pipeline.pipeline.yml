resources:
  pipelines:
    books_pipeline:
      name: books_pipeline
      configuration:
        "catalog_name": "workspace"
        "dataset_name": "bookstore_dataset"
        "schema_name": "default"
      libraries:
        - glob:
            include: ../src/books_pipeline/transformations/**
      catalog: workspace
      channel: CURRENT
      continuous: false
      photon: true
      root_path: ../src/books_pipeline
      schema: default
      serverless: true
